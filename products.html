<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | Nafi Kirana Store</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0d0d0d;color:#fff;}
nav{background:#000;padding:15px;text-align:center;}
nav a{color:#d4af37;margin:0 15px;text-decoration:none;}
section{padding:25px;}
.card{
  background:#151515;
  padding:20px;
  margin-bottom:15px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(212,175,55,.2);
}
h2{color:#d4af37;}
</style>
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="products.html">Products</a>
  <a href="contact.html">Contact</a>
</nav>

<section>
    <h2>Our Products</h2>

    <input type="text"
           id="search"
           placeholder="Search products..."
           style="width:100%;padding:10px;margin-bottom:20px;">

    <div id="products-container"></div>
</section>
  
<script>
async function loadProducts() {
    const response = await fetch('products.json');
    const products = await response.json();

    const container = document.getElementById('products-container');
    const search = document.getElementById('search');

    function display(filteredProducts) {
        container.innerHTML = '';

        filteredProducts.forEach(product => {
            container.innerHTML += `
                <div class="card">
                    ${product.emoji} ${product.name}

                    <br><br>

                    <a href="https://wa.me/917549858532?text=Hello, I want to order ${encodeURIComponent(product.name)}"
                       style="color:#d4af37;">
                        Order on WhatsApp
                    </a>
                </div>
            `;
        });
    }

    display(products);

    search.addEventListener('input', () => {
        const filtered = products.filter(product =>
            product.name.toLowerCase()
            .includes(search.value.toLowerCase())
        );

        display(filtered);
    });
}

window.addEventListener('DOMContentLoaded', loadProducts);
</script>
  
</body>
</html>
